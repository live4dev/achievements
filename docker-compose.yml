version: "3.9"

services:

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head && python web.py"

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - api
    command: python bot.py
