<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Achievements — Группы</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── Directory layout ──────────────────────────────────────── */
    .dir-layout {
      display: flex;
      height: 100vh;
      padding-top: var(--header-h);
    }

    /* Left column: groups */
    .dir-groups {
      width: 300px;
      flex-shrink: 0;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .dir-section-header {
      padding: 14px 16px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #groups-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
    }

    /* Group card */
    .dir-group-card {
      padding: 12px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
      transition: background .15s, border-color .15s;
    }
    .dir-group-card:hover {
      background: var(--bg-hover);
    }
    .dir-group-card.active {
      background: var(--bg-card);
      border-color: var(--accent);
    }
    .dir-group-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
    }
    .dir-group-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Right column: members */
    .dir-members {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .dir-members-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .dir-members-group-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #members-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 12px;
    }

    /* Member row */
    .dir-member-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      margin-bottom: 4px;
      text-decoration: none;
      color: var(--text);
      transition: background .15s, border-color .15s;
    }
    .dir-member-row:hover {
      background: var(--bg-hover);
      border-color: var(--border);
    }
    .dir-member-name {
      flex: 1;
      font-size: 14px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dir-member-role {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .04em;
      flex-shrink: 0;
    }
    .dir-role-admin  { background: #3b0764; color: #c084fc; }
    .dir-role-member { background: #1f2937; color: var(--text-muted); }
    .dir-member-arrow {
      color: var(--text-muted);
      font-size: 14px;
      flex-shrink: 0;
    }

    /* Misc */
    .dir-empty-hint {
      color: var(--text-muted);
      font-size: 13px;
      padding: 12px 4px;
    }
    .dir-loading {
      color: var(--text-muted);
      font-size: 13px;
      padding: 12px 4px;
    }
    .dir-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
      padding: 40px;
    }

    @media (max-width: 600px) {
      .dir-groups { width: 160px; }
      .dir-group-name { font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header id="header">
  <div class="header-left">
    <span class="group-title">🏆 Family Achievements</span>
  </div>
  <div class="header-right">
    <a href="/" class="btn btn-secondary">Ввод UUID</a>
  </div>
</header>

<!-- Body -->
<div class="dir-layout">

  <!-- Left: groups -->
  <aside class="dir-groups">
    <div class="dir-section-header">Группы</div>
    <div id="groups-list"></div>
  </aside>

  <!-- Right: members -->
  <main class="dir-members">

    <div id="members-empty" class="dir-placeholder">
      <p>Выберите группу слева,<br>чтобы увидеть участников</p>
    </div>

    <div id="members-content" class="hidden" style="display:flex;flex-direction:column;height:100%;">
      <div class="dir-members-header">
        <span id="members-group-title" class="dir-members-group-name"></span>
        <a id="aggregate-link" class="btn btn-secondary" href="#">Открыть агрегат группы</a>
      </div>
      <div id="members-list"></div>
    </div>

  </main>

</div>

<script src="/js/directory.js"></script>
</body>
</html>
