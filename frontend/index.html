<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Achievements</title>
  <link rel="stylesheet" href="/style.css">

  <!-- Cytoscape.js + dagre layout -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
</head>
<body>

<!-- ── Setup overlay ─────────────────────────────────────────── -->
<div id="setup-overlay" class="overlay hidden">
  <div class="setup-card">
    <h1>🏆 Family Achievements</h1>
    <p>Введите параметры группы для просмотра дерева ачивок.</p>
    <label>
      Group ID (UUID)
      <input id="setup-group" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" spellcheck="false">
    </label>
    <label>
      User ID (UUID) <span class="hint">— оставьте пустым для режима «Агрегат»</span>
      <input id="setup-user" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" spellcheck="false">
    </label>
    <div class="setup-actions">
      <button id="setup-participant-btn" class="btn btn-primary">Открыть как участник</button>
      <button id="setup-aggregate-btn" class="btn btn-secondary">Открыть агрегат группы</button>
    </div>
    <p id="setup-error" class="error hidden"></p>
  </div>
</div>

<!-- ── Main shell ──────────────────────────────────────────────── -->
<div id="app" class="hidden">

  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <span id="group-title" class="group-title"></span>
    </div>
    <div class="header-center">
      <div class="mode-toggle" role="group" aria-label="Режим просмотра">
        <button id="mode-participant" class="mode-btn active" data-mode="participant">Участник</button>
        <button id="mode-aggregate" class="mode-btn" data-mode="aggregate">Группа (агрегат)</button>
      </div>
    </div>
    <div class="header-right">
      <select id="member-select" class="member-select" title="Выбрать участника"></select>
      <button id="settings-btn" class="btn btn-icon" title="Настройки">⚙️</button>
    </div>
  </header>

  <!-- Body -->
  <div class="body-layout">

    <!-- Left panel: filters -->
    <aside id="filter-panel">
      <details open>
        <summary>Фильтры</summary>
        <div class="filter-section">
          <input id="search-input" type="search" placeholder="🔍 Поиск…" autocomplete="off">
        </div>

        <div class="filter-section">
          <div class="filter-label">Категории</div>
          <div id="category-filters" class="chip-group"></div>
        </div>

        <div class="filter-section">
          <div class="filter-label">Редкость</div>
          <div class="chip-group" id="rarity-filters">
            <label class="chip"><input type="checkbox" value="COMMON" checked> ⬜ Common</label>
            <label class="chip"><input type="checkbox" value="UNCOMMON" checked> 🟩 Uncommon</label>
            <label class="chip"><input type="checkbox" value="RARE" checked> 🟦 Rare</label>
            <label class="chip"><input type="checkbox" value="EPIC" checked> 🟪 Epic</label>
            <label class="chip"><input type="checkbox" value="LEGENDARY" checked> 🟨 Legendary</label>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-label">Статус</div>
          <div class="chip-group" id="status-filters">
            <label class="chip"><input type="checkbox" value="ACHIEVED" checked> ✅ Получено</label>
            <label class="chip"><input type="checkbox" value="AVAILABLE" checked> 🔵 Доступно</label>
            <label class="chip"><input type="checkbox" value="LOCKED" checked> 🔒 Заблокировано</label>
          </div>
        </div>

        <div class="filter-section">
          <button id="reset-filters-btn" class="btn btn-ghost btn-sm">Сбросить фильтры</button>
        </div>
      </details>

      <details id="legend-details" open>
        <summary>Легенда</summary>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot achieved"></span> Получено</div>
          <div class="legend-item"><span class="legend-dot available"></span> Доступно</div>
          <div class="legend-item"><span class="legend-dot locked"></span> Заблокировано</div>
          <div class="legend-item"><span class="legend-dot repeatable"></span> Повторяемое</div>
        </div>
      </details>
    </aside>

    <!-- Main canvas -->
    <main id="graph-container">
      <div id="cy"></div>
      <div id="graph-loading" class="loading-overlay">
        <div class="spinner"></div>
        <span>Загрузка…</span>
      </div>
      <div id="graph-empty" class="empty-state hidden">
        <p>Нет данных для отображения.<br>Попробуйте изменить фильтры.</p>
      </div>
      <!-- Controls -->
      <div class="graph-controls">
        <button id="fit-btn" class="ctrl-btn" title="Вписать в экран">⤢</button>
        <button id="zoom-in-btn" class="ctrl-btn" title="Приблизить">+</button>
        <button id="zoom-out-btn" class="ctrl-btn" title="Отдалить">−</button>
        <button id="layout-dir-btn" class="ctrl-btn" title="Направление графа">↕</button>
      </div>
    </main>

    <!-- Right panel: detail -->
    <aside id="detail-panel">
      <div id="detail-placeholder" class="detail-placeholder">
        <p>Выберите ачивку на графе, чтобы увидеть подробности.</p>
      </div>
      <div id="detail-content" class="hidden"></div>
    </aside>

  </div><!-- .body-layout -->
</div><!-- #app -->

<script type="module" src="/js/app.js"></script>
</body>
</html>
